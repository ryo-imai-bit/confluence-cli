name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binaries
        run: make release-build

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            confluence-darwin-arm64
            confluence-darwin-amd64
            confluence-linux-amd64
            confluence-linux-arm64
            confluence-windows-amd64.exe
          generate_release_notes: true
